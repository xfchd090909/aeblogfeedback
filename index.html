<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户反馈</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>输入信息提交反馈</h2>
        <form id="feedbackForm">
            <input type="text" id="name" placeholder="你的昵称(可选)" required>
            <input type="email" id="email" placeholder="联系邮箱(可选)" required>
            <textarea id="message" placeholder="你的建议..." required></textarea>
            <button type="submit" id="submitBtn">提交</button>
        </form>
        <p id="status"></p>
    </div>
    <script src="script.js"></script>
</body>
</html>
